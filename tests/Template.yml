---
functions: 
  - BE_FunctionName

# runs_on is a "default" setting and each test can also have it's own runs_on that overrides this.
# that way you can have a thing where 90% of the tests have a platform, but there's an overide with minimal code required for that one extra test.
# An example would be a function that only runs on mac/win, with 10 tests and you want a test that it fails properly on every other platform.
# Or a function that behaves differently on all platforms ( ie clipboard ) and so you default to false for all, and switch each test on one platform.
runs_on:
  macos: true
  windows: true
  ios: true
  ubuntu: true
  server: true

# Not yet considered.
requires:
  pro: false
  interaction: false
  ftp: false
  sftp: false
  smtp: false

# variables are just a way to store reusable values, and cannot be modified after setup.
# to use a variable reference the name as {{varName}}
variables:
  - name: varName
    dependencies: 
      - BE_OtherFuncton
    evaluate: |
      EvaluateCalc


tests:  
  - name: 
          
    # setField is the same as evaluate, except the result is stored into the Test::Data Container field
    # to use the field set in the setField reference it as {{field::Data}}
    setField: |
      FileMaker Calculation

    # evaluate is the calculation passed to the Evaluate function in FileMaker to see if this test is passing.
    evaluate: | 
      FileMaker Calculation {{version}} 

    # output is what we expect from the evaluate calculation.  If they match then it's a pass.
    # result can be True, False, a text String, a number, or a {{variable}}
    # When there is an expected output of True or False, the actual output is run through GetAsBoolean first.
    # result is not passed through the Evaluate function so cannot be a calculation.  If you need that, set a var or debug.
    output: result
    
    # If there's an expected value for BE_GetLastError then you can also check for it.
    # This can also be a list where the result should match at least one of the values
    errorCode: 1

    # debug is any other data you want to report when output fails to match to assist with what went wrong with the calculation
    # typical use case is to set $variables via Let when running a complex calc and then showing those later.
    debug: | 
      FileMaker Calculation


# files just goes at the end because the base64 can be huge and putting it last makes it easier to manage tests.  
# Order doesn't matter in the setup, files are evaluated before tests and stored in variables.
# To use a file, reference it as :
#  {{filePath::name}} for a file saved to disk and the quoted path in its place or 
#  {{fileVar::name}} for a file turned into a container in a local variable called $name

files:
  - name: name
    base64: | 
      ABEiM0RVZneImaq7zN3u/w==
