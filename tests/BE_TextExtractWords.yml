---
functions: 
  - BE_TextExtractWords

runs_on:
  macos: true
  windows: true
  ios: true
  ubuntu: true
  server: true

requires:
  pro: false
  interaction: false
  ftp: false
  sftp: false
  smtp: false

tests:
  
  - name: test $var extract, space separator, local and global
    evaluate: BE_TextExtractWords ( "$$global & $variable" )
    output: "$$globalВ¶$variable"

  - name: Single line comment
    evaluate: BE_TextExtractWords ( "//$variable" )
    output: ""

  - name: Quoted string 
    evaluate: BE_TextExtractWords ( "\"this is a string\" & $a_variable" )
    output: "$a_variable"
  
  - name: Multiline comment 
    evaluate: BE_TextExtractWords ( "/* a $variable is here */" )
    output: ""
 
  - name: Backslash as separator only get each variable once 
    evaluate: BE_TextExtractWords ( "$this+$that/$this" )
    output: "$thisВ¶$that"
 
  - name: Two lines, one of which is is a comment 
    evaluate: BE_TextExtractWords ( "// a $variableВ¶\"and\" + $another" )
    output: "$another"
 
  - name: Hidden var 
    evaluate: BE_TextExtractWords ( "$a & /* $hidden */ $one *В¶$here" )
    output: "$aВ¶$oneВ¶$here"
 
  - name: Semicolon as a separator 
    evaluate: BE_TextExtractWords ( "if($a;$b;$c) )
    output: "$aВ¶$bВ¶$c"

  - name: Minus as a separator 
    evaluate: BE_TextExtractWords ( "3-$minus-3" )
    output: "$minus"

  - name: An incomplete comment 
    evaluate: BE_TextExtractWords ( "$half_a_comment /* something" )
    output: "$half_a_comment"
    
  - name: An incomplete string 
    evaluate: BE_TextExtractWords ( "$this & \" is half a string \\\" with an embedded quote" )
    output: "$this"
    
  - name: Embedded quote
    evaluate: BE_TextExtractWords ( "$this & \" is a string \\\" with an embedded quote\" & $more" )
    output: "$thisВ¶$more"
    
  - name: Embedded quotes
    evaluate: BE_TextExtractWords ( ""$this & \" is half a string \\\" with two \\\" embedded quotes\" & $more" )
    output: "$thisВ¶$more"
    
  - name: Incomplete string 
    evaluate: BE_TextExtractWords ( "$this & \"half a string" )
    output: "$this"

  - name: Star as a separator 
    evaluate: BE_TextExtractWords ( "$this*$that" )
    output: "$thisВ¶$that"

  - name: Greater than as a separator 
    evaluate: BE_TextExtractWords ( "$greater>$thanв‰Ґ$equal" )
    output: "$greaterВ¶$thanВ¶$equal"

  - name: Less than as a separator 
    evaluate: BE_TextExtractWords ( "$less<$thanв‰¤$equal" )
    output: "$lessВ¶$thanВ¶$equal"

  - name: Equals as a separator 
    evaluate: BE_TextExtractWords ( "$not_equalв‰ $equal=$to" )
    output: "$not_equalВ¶$equalВ¶$to"

  - name: Other Separators 
    evaluate: BE_TextExtractWords ( "$$global&$variable^$power+$plus" )
    output: "$$globalВ¶$variableВ¶$powerВ¶$plus"

  - name: Unicode 
    evaluate: BE_TextExtractWords ( "$дё–з•ЊгЃ®д»ЈиЎЁзљ„гЃЄ & $дё–з•ЊгЃ®д»ЈиЎЁзљ„гЃЄдЅї" )
    output: "$дё–з•ЊгЃ®д»ЈиЎЁзљ„гЃЄВ¶$дё–з•ЊгЃ®д»ЈиЎЁзљ„гЃЄдЅї"

  - name: Variable Index 
    evaluate: BE_TextExtractWords ( "$this[$one]" )
    output: "$thisВ¶$one"
