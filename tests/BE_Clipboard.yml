---
functions: 
  - BE_ClipboardFormats

runs_on:
  macos: true
  windows: true
  ios: true
  ubuntu: false
  server: false

requires:
  pro: false
  interaction: false
  ftp: false
  sftp: false
  smtp: false

variables:
  - name: "NotImplemented"
    evaluate: 3

tests:  
  - name:  Set Text Clipboard 
    evaluate: BE_ClipboardSetText ( "nothing to say" ; "public.utf8-plain-text" )
    output: 1

  - name:  Get Text Clipboard Format
    evaluate: Position ( BE_ClipboardFormats ; "public.utf8-plain-text" ; 1 ; 1 ) > 0
    output: True

  - name:  Get Text Clipboard Content
    evaluate: BE_ClipboardGetText ( "public.utf8-plain-text" )
    output: "nothing to say"

  - name:  Set XML Clipboard 
    evaluate: BE_ClipboardSetText ( "<fmxmlsnippet type=\"FMObjectList\"><Script includeInMenu=\"True\" runFullAccess=\"False\" id=\"1\" name=\"A shiny new Script\"></Script></fmxmlsnippet>" ; "CorePasteboardFlavorType 0x584D5343" )
    output: 1

  - name:  Set XML Clipboard Format
    evaluate: Position ( BE_ClipboardFormats ; "CorePasteboardFlavorType 0x584D5343" ; 1 ; 1 ) > 0
    output: True

  - name:  Get XML Clipboard Content
    evaluate: BE_ClipboardGetText ( "CorePasteboardFlavorType 0x584D5343" )
    output: "<fmxmlsnippet type=\"FMObjectList\"><Script includeInMenu=\"True\" runFullAccess=\"False\" id=\"1\" name=\"A shiny new Script\"></Script></fmxmlsnippet>"

  - name:  Set Clipboard as container
    evaluate: BE_ClipboardSetFile ( {{fileVar::Test}} ; "com.adobe.pdf" )
    output: 0

  - name: Get Clipboard File with default name
    setField: BE_ClipboardGetFile ( "com.adobe.pdf" )
    evaluate: | 
      {{field::Data}}
    output: "com.adobe.pdf" 

  - name: Get Clipboard File with default name
    setField: BE_ClipboardGetFile ( "com.adobe.pdf" )
    evaluate: Length ( BE_ClipboardGetFile ( "com.adobe.pdf" ) ) = Length ( {{field::Data}} )
    output: "com.adobe.pdf" 

  - name: Get Clipboard File with different name
    setField: BE_ClipboardGetFile ( "com.adobe.pdf" ; "Clipped" )
    evaluate: | 
      {{field::Data}}
    output: "Clipped" 

  - name:  Set Empty Clipboard 
    setField: BE_ClipboardGetFile ( "" )
    evaluate: | 
      {{field::Data}}
    output: "" 

  - name: Set Windows Text Format
    runs_on:
      ios: false
      macos: false
      windows: true
    evaluate: BE_ClipboardSetText ( "The rest is silence" ; "Rich Text Format" )
    output: True  

  - name:  Get Windows Clipboard Content
    runs_on:
      ios: false
      macos: false
      windows: true
    evaluate: Position ( BE_ClipboardFormats ; "Rich Text Format" ; 1 ; 1 ) > 0
    output: True

  - name:  Get Windows Clipboard Content
    runs_on:
      ios: false
      macos: false
      windows: true
    evaluate: BE_ClipboardGetText ( "Rich Text Format" )
    output: "The rest is silence"

  - name: NotImplemented
    runs_on:
      ubuntu: true
      server: true
    evaluate: BE_ClipboardFormats & BE_ClipboardGetFile ( "noFile" ) & BE_ClipboardGetText ( "someFormat" )
    output: "???"
    errorCode: 3

