           </reply>
         </replies>
       </result>
      </checkRepliesResponse>



tests:  
  - name: Strip XML
    evaluate: BE_XMLStripInvalidCharacters ( {{filePath::strip.xml}} ) 
    output: 2

  - name: Strip XML utf16
    evaluate: BE_XMLStripInvalidCharacters ( {{filePath::utf16.xml}} ) 
    output: 0

  - name: Apply XSLT
    evaluate: BE_XSLT_Apply ( {{filePath::rss.xml}} ; {{filePath::rss.xslt}} ; {{tempPath}} & "rss.xml.out" )
    output: ""

  - name: Apply XSLT with Error
    evaluate: |
      Let ( 
        $result = BE_XSLT_Apply ( {{filePath::rss.xml}} ; {{filePath::rssError.xslt}} ; {{tempPath}} & "rss.xml.out" ) ; 
        Position ( $result ; "runtime error: file <FileMaker::Text::XSLT> line 92 element call-template" ; 1 ; 1 )
      )
    output: 1
    debug: |
      "BE_XSLT_Apply Result : " & $result & "¶¶" & 
      "BE_XSLT_Apply Result should start with : \"runtime error: file <FileMaker::Text::XSLT> line 92 element call-template\""

  - name: XPath receiptId
    evaluate: BE_XPath ( {{textXML}} ; "/xmlns:checkRepliesResponse/xmlns:result/xmlns:replies/xmlns:reply[2]/@receiptId" ; "xmlns=http://xml.m4u.com.au/2009" )
    output: "63452339"

  - name: XPath receiptId Data
    evaluate: |
      BE_XPath ( {{textXML}} ; 
        "/xmlns:checkRepliesResponse/xmlns:result/xmlns:replies/xmlns:reply[2]/@receiptId" ; 
        "xmlns=http://xml.m4u.com.au/2009" ; 
        False 
      )
    output: "receiptId=\"63452339\""

  - name: XPath All receiptId
    evaluate: BE_XPathAll ( {{textXML}} ; "/xmlns:checkRepliesResponse/xmlns:result/xmlns:replies/xmlns:reply/@receiptId" ; "xmlns=http://xml.m4u.com.au/2009" )
    output: "29717636¶63452339"

  - name: XPath Attribute
    evaluate: BE_XPath ( {{textXML}} ; "/xmlns:checkRepliesResponse/xmlns:result/@returned" ; "xmlns=http://xml.m4u.com.au/2009" ) 
    output: "2"
 
  - name: XPath Count
    evaluate: BE_XPath ( {{textXML}} ; "count(//reply)" )
    output: 2

  - name: XPath All Count
    evaluate: BE_XPathAll ( {{textXML}} ; "count(//reply)" ; "xmlns=http://xml.m4u.com.au/2009" )
    output: 2

  - name: XPath Name
    evaluate: BE_XPath ( {{textXML}} ; "name(//reply)" )
    output: "reply"

  - name: XPath All Name
    evaluate: BE_XPathAll ( {{textXML}} ; "name(//reply)" ; "xmlns=http://xml.m4u.com.au/2009" )
    output: "reply"

  - name: XPath name content
    evaluate: |
      Let ( $result = BE_XPath ( {{textXML}} ; "//*[name()='reply']" ; "xmlns=http://xml.m4u.com.au/2009" ) ; 
        Position ( $result ; "Thanks here's my reply" ; 1 ; 1 )
      )
    output: True
    debug: |
      "Result : " & $result

  - name: XPath All name content
    evaluate: |
      Let ( $result = BE_XPathAll ( {{textXML}} ; "//*[name()='reply']" ; "xmlns=http://xml.m4u.com.au/2009" ) ; 
        Position ( $result ; "Thanks here's my reply" ; 1 ; 1 )
      )
    output: True
    debug: |
      "Result : " & $result

  - name: BE_XMLParse
    evaluate: BE_XMLParse ( "{{filePath::validate.xml}}" )
    output: ""

  - name: BE_XMLParse field Error
    setField: |
      Base64Decode ( 
        "PD94bWwgdmVyc2lvbj0iMS4wIj8+Cjx0ZXN0PgoJPGZhbHNlPjwvZmFsc2U+CjwvdGVzdD4K"
      )
    evaluate: BE_XMLParse ( {{field::Data}} )
    output: "?"
    errorCode: 2

  - name: BE_XMLParse Error
    evaluate: |
      Let ( $result = BE_XMLParse ( "{{filePath::validateFail.xml}}" ) ; 
        Position ( $result ; "validate.xml at line 3" ; 1 ; 1 ) and 
        Position ( $result ; "expected '>'" ; 1 ; 1 )
      )
    output: True
    debug: |
      "Result : " & $result



