---
functions: 
  - BE_Version
  - BE_VersionAutoUpdate

runs_on:
  macos: true
  windows: true
  ios: true
  ubuntu: true
  server: true

requires:
  pro: false
  interaction: false
  ftp: false
  sftp: false
  smtp: false

variables:
  - name: "version"
    evaluate: BE_Version
  - name: "versionAU"
    evaluate: BE_VersionAutoUpdate

tests:

  - name: The version is of the x.x.x and contains 2 dots  
    evaluate: PatternCount ( BE_Version ; "." )
    output: 2

  - name: The version string should only consist of numerals and the (english) decimal separator
    evaluate: Filter ( {{version}} ; "0123456789.bd" )
    output: {{version}}

  - name: Should be eight characters long
    evaluate: Length ( {{versionAU}} )
    output: 8

  - name: Should only contain numerals
    evaluate: Filter ( {{versionAU}} ; "0123456789" )
    output: {{versionAU}}

  - name: BE Error reset check
    evaluate: if ( BE_GetLastError ; BE_GetLastError ; BE_GetLastError )
    output: 0
