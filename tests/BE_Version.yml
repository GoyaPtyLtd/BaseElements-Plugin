---
function: BE_Version

runs_on:
  macos: true
  windows: true
  ios: true
  ubuntu: true
  server: true

requires:
  pro: false
  interaction: false
  ftp: false
  sftp: false
  smtp: false

vars:
  version: |
    BE_Version

tests:

  - name: The version is of the x.x.x where x is either one digit
    evaluate: | 
      Length ( {{version}} )
    output: 5

  - name: The version is of the x.x.x and contains 2 dots  
    evaluate: | 
      PatternCount ( BE_Version ; "." )
    output: 2

  - name: The version string should only consist of numerals and the (english) decimal separator
    evaluate: | 
      Filter ( {{version}} ; "0123456789.bd" )
    output: |
      {{version}}
