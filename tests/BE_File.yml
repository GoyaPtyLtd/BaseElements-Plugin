---
functions: 
  - BE_FileExists
  - BE_FolderCreate

runs_on:
  macos: true
  windows: true
  ios: true
  ubuntu: true
  server: true

requires:
  pro: false
  interaction: false
  ftp: false
  sftp: false
  smtp: false

variables:
  - name: tempPath
    evaluate: |
      ConvertFromFileMakerPath ( Get ( TemporaryPath ) ; Case ( Get ( SystemPlatform ) = -2 ; WinPath ; PosixPath ) ) & 
      Get ( UUID ) & 
      Case ( Get ( SystemPlatform ) = -2 ; "\\" ; "/" )
  
  - name: testFile1
    evaluate: "be_plugin_tests.txt"

  - name: testPath1
    evaluate: |
      {{tempPath}} & {{testFile1}}

  - name: testFile2
    evaluate: "copy_move_tests.txt"

  - name: testPath2
    evaluate: |
      {{tempPath}} & {{testFile2}}

  - name: brokenFolder
    evaluate: |
      "/does:not:exist" & {{tempPath}}

  - name: brokenFile
    evaluate: |
      "/does:not:exist" & {{tempPath}} & "file_doesnt_exist.txt"

  - name: xmlOut
    output: |
      <?xml version="1.0" encoding="macintosh"?>
      <!DOCTYPE rss PUBLIC "rss" "http://www.scripting.com/dtd/rss-0_91.dtd">
      <rss version="0.91">
        <channel>
          <title>Latest News</title>
          <link>http://localhost/</link>
          <description>Recent news articles</description>
          <language>en-us</language>
          <item>
            <title>Slashdot</title>
            <link>http://slashdot.org/</link>
            <description>News for Nerds, stuff that matters</description>
          </item>
          <item>
            <title>The Register</title>
            <link>http://www.register.co.uk/</link>
            <description>Biting the hand that feeds IT</description>
          </item>
          <item>
            <title>O'Reilly Network</title>
            <link>http://www.oreillynet.com/</link>
            <description>Developers' Hub -- web development, open source development, open and emerging technologies</description>
          </item>
          <item>
            <title>Scripting News</title>
            <link>http://www.scripting.com/</link>
            <description>Dave Winer's weblog about scripting and stuff like that.</description>
          </item>
          <item>
            <title>FileMaker XML Central</title>
            <link>http://www.filemaker.com.au/xml/</link>
            <description>XML, the standard for universal data exchange, extends the reach of FileMaker Pro 6.</description>
          </item>
        </channel>
      </rss>


tests:  
  - name: Test Directory shouldn't exist 
    evaluate: BE_FileExists ( {{tempPath}} )
    output: False

  - name: Create Test Directory 
    evaluate: BE_FolderCreate ( {{tempPath}} )
    output: 0

  - name: Check Test Directory Exists
    evaluate: BE_FileExists ( {{tempPath}} )
    output: True

  - name: Test File shouldn't exist
    evaluate: BE_FileReadText ( {{testPath1}} )
    output: "?"

  - name: Read from missing text file
    evaluate: BE_FileExists ( {{testPath1}} )
    output: False
    errorCode: 2

  - name: Open Missing Test File
    interaction: true
    ios: false
    evaluate: BE_FileOpen ( TestFile )
    output: False

  - name: Write to Test File 
    evaluate: BE_FileWriteText ( {{testPath1}} ; "some text here")
    output: 0

  - name: Check Test File Content
    evaluate: BE_FileReadText ( {{testPath1}} )
    output: "some text here"

  - name: Open Test File
    interaction: true
    ios: false
    evaluate: BE_FileOpen ( TestFile )
    output: True

  - name: Select Test File
    interaction: true
    ios: false
    evaluate: Position ( BE_FileSelectDialog ( "Please select a file in the current directory"; {{tempPath}} ) ; {{tempPath}} ; 1 ; 1 )
    output: True

  - name: Select Test Folder
    interaction: true
    evaluate: Position ( FolderSelectDialog ( "Please select the current folder"; {{tempPath}} ) ; {{tempPath}} ; 1 ; 1 )
    output: True

  - name: Append to Test File 
    evaluate: BE_FileWriteText ( {{testPath1}} ; " and some more text here" ; True )
    output: 0

  - name: Check Test File Content
    evaluate: BE_FileReadText ( {{testPath1}} )
    output: "some text here and some more text here"

  - name: Overwrite Test File 
    evaluate: BE_FileWriteText ( {{testPath1}} ; "new text here")
    output: 0

  - name: Check Test File Content
    evaluate: BE_FileReadText ( {{testPath1}} )
    output: "new text here"

  - name: Copy Test File shouldn't exist
    evaluate: BE_FileExists ( {{testPath2}} )
    output: 0

  - name: Copy File source error
    evaluate: BE_FileCopy ( {{brokenFile}} ; {{testPath2}} )
    output: True

  - name: Copy File destination error
    evaluate: BE_FileCopy ( {{testPath1}} ; {{brokenFile}} )
    output: True

  - name: Copy Test File
    evaluate: BE_FileCopy ( {{testPath1}} ; {{testPath2}} )
    output: 0

  - name: Check Copy File Exists
    evaluate: BE_FileExists ( {{testPath2}} )
    output: True

  - name: Check Test File wasn't moved
    evaluate: BE_FileExists ( {{testPath1}} )
    output: True

  - name: Check File List of broken folder
    evaluate: BE_FileListFolder ( {{brokenFolder}} )
    output: "?"
    errorCode: 
      - 2
      - 123

  - name: Check the folder for both files
    evaluate: |
      Let ( [
        $folderList = BE_FileListFolder ( {{tempPath}} ) ; 
        $folderCheck = List ( {{testFile1}} ; {{testFile2}} ) ] ;
        BE_ValuesSort ( $folderList ) = 
        BE_ValuesSort ( $folderCheck ) 
      )
    output: True
    debug: |
      "BE_FileListFolder out was : ¬∂" & $folderList

  - name: Delete Test File
    evaluate: BE_FileDelete ( {{testPath1}} )
    output: 0

  - name: Check Test File was deleted
    evaluate: BE_FileExists ( {{testPath1}} )
    output: False

  - name: Move File source error
    evaluate: BE_FileMove ( {{brokenFile}} ; {{testPath1}} )
    output: True

  - name: Move File destination error
    evaluate: BE_FileMove ( {{testPath2}} ; {{brokenFile}} )
    output: True

  - name: Move Test File
    evaluate: BE_FileMove ( {{testPath2}} ; {{testPath1}} )
    output: 0

  - name: Check Test File was copied
    evaluate: BE_FileExists ( {{testPath1}} )
    output: True

  - name: Check Copy File was moved
    evaluate: BE_FileExists ( {{testPath2}} )
    output: False

  - name: Delete Test Folder
    evaluate: BE_FileDelete ( {{tempPath}} )
    output: 0

  - name: Check Test Directory Was Deleted
    evaluate: BE_FileExists ( {{tempPath}} )
    output: False

  - name: BE_FileWriteText destination error
    evaluate: BE_FileWriteText ( {{brokenFile}} ; " and some more text here" ; true )
    output: True

  - name: FileReadText Check Line Ending Replaces
    evaluate: |
      Let ( 
        $result = BE_FileReadText ( {{filePath::rss.xml.out}} ) ;  
        Substitute ( $result = Substitute ( {{fileVar::rss.xml}} ; Char ( 13 ) ; Char ( 10 ) 
      )
    output: True
    debug: |
      "BE_FileReadText Result = " & $result

  - name: Set MacRoman
    evaluate: BE_SetTextEncoding ( "MacRoman" )
    output: False

  - name: Read MacRoman
    evaluate: BE_FileReadText ( {{filePath::macroman.txt}} )
    output: {{xmlOut}}

  - name: Reset Encoding
    evaluate: BE_SetTextEncoding ( "" )
    output: False

  - name: Read MacRoman Error
    evaluate: BE_FileReadText ( {{filePath::macroman.txt}} ) = {{xmlOut}}
    output: False

  - name: Set UTF16
    evaluate: BE_SetTextEncoding ( "utf-16" )
    output: False

  - name: Read UTF16
    evaluate: BE_FileReadText ( {{filePath::utf16.txt}} )
    output: {{xmlOut}}

  - name: Reset UTF16 Encoding
    evaluate: BE_SetTextEncoding ( "" )
    output: False

  - name: Read UTF16 Error
    evaluate: BE_FileReadText ( {{filePath::utf16.txt}} ) = {{xmlOut}}
    output: False

  - name: Check File Size
    evaluate: BE_FileSize ( {{filePath::filesize.txt}} )
    output: 1171

  - name: Check File Size Error
    evaluate: BE_FileSize ( "path does not exist" )
    output: "?"
    errorCode: True

  - name: TextEncoding Error
    evaluate: BE_SetTextEncoding ( "ISO Latin 1" )
    output: "?"
    errorCode: 22

  - name: BE_GetLastError value remains even after being called
    evaluate: BE_GetLastError
    output: 22
    
  - name: Reset Encoding - will also reset BE_GetLastError and check it again
    evaluate: BE_SetTextEncoding ( "" )
    output: False




