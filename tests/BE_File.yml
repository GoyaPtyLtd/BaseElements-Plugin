---
functions: 
  - BE_FileExists
  - BE_FolderCreate

runs_on:
  macos: true
  windows: true
  ios: true
  ubuntu: true
  server: true

requires:
  pro: false
  interaction: false
  ftp: false
  sftp: false
  smtp: false

variables:
  - name: tempPath
    evaluate: |
      ConvertFromFileMakerPath ( Get ( TemporaryPath ) ; Case ( Get ( SystemPlatform ) = -2 ; WinPath ; PosixPath ) ) & 
      Get ( UUID ) & 
      Case ( Get ( SystemPlatform ) = -2 ; "\\" ; "/" )

  - name: testFile1
    evaluate: "be_plugin_tests.txt"

  - name: testPath1
    evaluate: |
      {{tempPath}} & {{testFile1}}

  - name: testFile2
    evaluate: "copy_move_tests.txt"

  - name: testPath2
    evaluate: |
      {{tempPath}} & {{testFile2}}

  - name: brokenFolder
    evaluate: |
      "/does:not:exist" & {{tempPath}}

  - name: brokenFile
    evaluate: |
      "/does:not:exist" & {{tempPath}} & "file_doesnt_exist.txt"


tests:  
  - name: Test Directory shouldn't exist 
    evaluate: BE_FileExists ( {{tempPath}} )
    output: False

  - name: Create Test Directory 
    evaluate: BE_FolderCreate ( {{tempPath}} )
    output: 0

  - name: Check Test Directory Exists
    evaluate: BE_FileExists ( {{tempPath}} )
    output: True

  - name: Test File shouldn't exist
    evaluate: BE_FileExists ( {{testPath1}} )
    output: False

  - name: Write to Test File 
    evaluate: BE_FileWriteText ( {{testPath1}} ; "some text here")
    output: 0

  - name: Check Test File Content
    evaluate: BE_FileReadText ( {{testPath1}} )
    output: "some text here"

  - name: Append to Test File 
    evaluate: BE_FileWriteText ( {{testPath1}} ; " and some more text here" ; True )
    output: 0

  - name: Check Test File Content
    evaluate: BE_FileReadText ( {{testPath1}} )
    output: "some text here and some more text here"

  - name: Overwrite Test File 
    evaluate: BE_FileWriteText ( {{testPath1}} ; "new text here")
    output: 0

  - name: Check Test File Content
    evaluate: BE_FileReadText ( {{testPath1}} )
    output: "new text here"

  - name: Copy Test File shouldn't exist
    evaluate: BE_FileExists ( {{testPath2}} )
    output: 0

  - name: Copy File source error
    evaluate: BE_FileCopy ( {{brokenFile}} ; {{testPath2}} )
    output: True

  - name: Copy File destination error
    evaluate: BE_FileCopy ( {{testPath1}} ; {{brokenFile}} )
    output: True

  - name: Copy Test File
    evaluate: BE_FileCopy ( {{testPath1}} ; {{testPath2}} )
    output: 0

  - name: Check Copy File Exists
    evaluate: BE_FileExists ( {{testPath2}} )
    output: True

  - name: Check Test File wasn't moved
    evaluate: BE_FileExists ( {{testPath1}} )
    output: True

  - name: Check File List of broken folder
    evaluate: BE_FileListFolder ( {{brokenFolder}} )
    output: "?"
    errorCode: 
      - 2
      - 123

  - name: Check the folder for both files
    evaluate: |
      Let ( [
        $folderList = BE_FileListFolder ( {{tempPath}} ) ; 
        $folderCheck = List ( {{testFile1}} ; {{testFile2}} ) ] ;
        BE_ValuesSort ( $folderList ) = 
        BE_ValuesSort ( $folderCheck ) 
      )
    output: True
    debug: |
      "BE_FileListFolder out was : ¶" & $folderList

  - name: Delete Test File
    evaluate: BE_FileDelete ( {{testPath1}} )
    output: 0

  - name: Check Test File was deleted
    evaluate: BE_FileExists ( {{testPath1}} )
    output: False

  - name: Move File source error
    evaluate: BE_FileMove ( {{brokenFile}} ; {{testPath1}} )
    output: True

  - name: Move File destination error
    evaluate: BE_FileMove ( {{testPath2}} ; {{brokenFile}} )
    output: True

  - name: Move Test File
    evaluate: BE_FileMove ( {{testPath2}} ; {{testPath1}} )
    output: 0

  - name: Check Test File was copied
    evaluate: BE_FileExists ( {{testPath1}} )
    output: True

  - name: Check Copy File was moved
    evaluate: BE_FileExists ( {{testPath2}} )
    output: False

  - name: Delete Test Folder
    evaluate: BE_FileDelete ( {{tempPath}} )
    output: 0

  - name: Check Test Directory Was Deleted
    evaluate: BE_FileExists ( {{tempPath}} )
    output: False

  - name: BE_FileWriteText destination error
    evaluate: BE_FileWriteText ( {{brokenFile}} ; " and some more text here" ; true )
    output: True

  - name: FileReadText Check Line Ending Replaces
    evaluate: |
      Let ( 
        $result = BE_FileReadText ( {{filePath::rss.xml.out}} ) ; Char ( 13 ) ; Char ( 10 ) ) ; 
        Substitute ( $result = Substitute ( {{fileVar::rss.xml}} ; Char ( 13 ) ; Char ( 10 ) 
      )
    output: True
    debug: |
      "BE_FileReadText Result = " & $result

