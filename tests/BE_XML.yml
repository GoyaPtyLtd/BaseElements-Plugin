functions: 
  - BE_FunctionName

runs_on:
  macos: true
  windows: true
  ios: true
  ubuntu: true
  server: true

requires:
  pro: false
  interaction: false
  ftp: false
  sftp: false
  smtp: false

variables:
  - name: tempPath
    evaluate: ConvertFromFileMakerPath ( Get ( TemporaryPath ) ; Case ( Get ( SystemPlatform ) = -2 ; WinPath ; PosixPath ) )

  - name: textXML
    evaluate: |
      <?xml version="1.0" encoding="utf-8"?>
      <checkRepliesResponse xmlns="http://xml.m4u.com.au/2009">
       <result returned="2" remaining="0">
         <replies>
           <reply format="SMS" uid="1" receiptId="29717636">
             <origin>61063452339</origin>
